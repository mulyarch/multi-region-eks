apiVersion: v1
kind: Service
metadata:
  name: apache-hello-svc
  namespace: apache-app
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  selector:
    app: apache-hello
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

